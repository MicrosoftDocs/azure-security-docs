### YamlMime:Landing

title: Confidential Computing Ledger
summary: Confidential Computing Ledger hosts two ledger workloads — Azure confidential ledger for customer-managed transactional ledgers, and Microsoft's Signing Transparency Ledger for software signing transparency. Both workloads run on the same hardware-backed confidential computing platform with the Confidential Consortium Framework.

metadata:
  title: Confidential Computing Ledger documentation
  description: Learn how to use Confidential Computing Ledger and its two workloads — Azure confidential ledger and Microsoft's Signing Transparency Ledger.
  ms.service: azure-confidential-ledger
